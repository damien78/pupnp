name: Build

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
      - "branch-*"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "COPYING"
  pull_request:
    branches:
      - "**"
      - "!no_ci-*"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "COPYING"

#
# Some repeated stuff
#
env:
  sanitizer_autotools_flags: |-
    CFLAGS="-fsanitize=address,leak" \
    LDFLAGS="-fsanitize=address,leak"

  cmake_common_flags: |-
    -S . \
    -B build \
    -DDOWNLOAD_AND_BUILD_DEPS=ON \
    -DUPNP_ENABLE_OPEN_SSL=ON \
    -DUPNP_ENABLE_UNSPECIFIED_SERVER=ON

  cmake_sanitizer_flags: |-
    -DCMAKE_C_FLAGS="-fsanitize=address,leak" \
    -DCMAKE_CXX_FLAGS="-fsanitize=address,leak" \
    -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,leak"

  cmake_tsan_flags: |-
    -DCMAKE_C_FLAGS="-fsanitize=thread" \
    -DCMAKE_CXX_FLAGS="-fsanitize=thread" \
    -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=thread"

  ctest_flags: |-
    --test-dir build \
    --output-on-failure \
    --timeout 30 \
    --exclude-regex "^pthreads4w"

  CMAKE_BUILD_PARALLEL_LEVEL: 8

jobs:
  # Linux builds
  linux:
    name: Build (${{ matrix.os }}) - ${{ matrix.conf }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        conf: [ Debug, Release ]
        include:
          # Debug builds enable _FORTIFY_SOURCE=2 to catch buffer-overflow
          # bugs such as FD_SET with fd >= FD_SETSIZE (issue #423).
          # -O1 is required: _FORTIFY_SOURCE is a no-op at -O0.
          - conf: Debug
            extra_c_flags: " -O1 -D_FORTIFY_SOURCE=2"
          - conf: Release
            extra_c_flags: ""
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Install Python test dependencies
        run: pip install pytest
      - name: Configure (create build system)
        run: |
          cmake \
            ${{ env.cmake_common_flags }} \
            -DCMAKE_C_FLAGS="-Wall -Wpedantic${{ matrix.extra_c_flags }}" \
            -DCMAKE_BUILD_TYPE=${{ matrix.conf }} \
            -DCMAKE_INSTALL_PREFIX=${{ GITHUB.WORKSPACE }}/test-install
      - name: Build
        run: cmake --build build --config ${{ matrix.conf }}
      - name: Test
        run: ctest ${{ env.ctest_flags }} -C ${{ matrix.conf }}
      - name: Debug output
        run: cmake -DBUILD_DIR=build -P cmake/post-test.cmake
      - name: Install
        run: cmake --install build --config ${{ matrix.conf }}
  omnios:
    name: Build OmniOS - ${{ matrix.conf }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        conf: [ Debug, Release ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: vmactions/omnios-vm@v1
        with:
          prepare: |
            pkg install cmake gcc14 make
          run: |
            cmake \
              ${{ env.cmake_common_flags }} \
              -DCMAKE_C_FLAGS="-Wall -Wpedantic" \
              -DCMAKE_BUILD_TYPE=${{ matrix.conf }} \
              -DCMAKE_INSTALL_PREFIX=${{ GITHUB.WORKSPACE }}/test-install
            cmake --build build --config ${{ matrix.conf }}
            ctest ${{ env.ctest_flags }} -C ${{ matrix.conf }}
            cmake -DBUILD_DIR=build -P cmake/post-test.cmake
            cmake --install build --config ${{ matrix.conf }}
  # Windows Visual Studio builds
  windows-msvc:
    name: Build (${{ matrix.os }}) - ${{ matrix.conf }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ windows-latest, macos-latest ]
        conf: [ Debug, Release ]
      fail-fast: false
    defaults:
      run:
        shell: bash # Fix PowerShell incompatibility
    steps:
      - uses: actions/checkout@v6
      - name: Install OpenSSL (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          echo "OPENSSL_ROOT_DIR=C:/Program Files/OpenSSL" >> $GITHUB_ENV
      - name: Install OpenSSL (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          brew install openssl
          # Save OpenSSL path for CMake
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl)/include" >> $GITHUB_ENV
          echo "OPENSSL_CRYPTO_LIBRARY=$(brew --prefix openssl)/lib/libcrypto.dylib" >> $GITHUB_ENV
          echo "OPENSSL_SSL_LIBRARY=$(brew --prefix openssl)/lib/libssl.dylib" >> $GITHUB_ENV
      - name: Configure
        run: |
          cmake \
            ${{ env.cmake_common_flags }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.conf }} \
            -DCMAKE_INSTALL_PREFIX=${{ GITHUB.WORKSPACE }}/test-install \
            -DIXML_ENABLE_TESTING_INTEGRATION=OFF \
            -DUPNP_ENABLE_TESTING_INTEGRATION=OFF \
            ${OPENSSL_ROOT_DIR:+-DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR"} \
            ${OPENSSL_INCLUDE_DIR:+-DOPENSSL_INCLUDE_DIR="$OPENSSL_INCLUDE_DIR"} \
            ${OPENSSL_CRYPTO_LIBRARY:+-DOPENSSL_CRYPTO_LIBRARY="$OPENSSL_CRYPTO_LIBRARY"} \
            ${OPENSSL_SSL_LIBRARY:+-DOPENSSL_SSL_LIBRARY="$OPENSSL_SSL_LIBRARY"}
      - name: Build
        run: cmake --build build --config ${{ matrix.conf }}
      - name: Test
        run: ctest ${{ env.ctest_flags }} -C ${{ matrix.conf }}
      - name: Debug output
        run: cmake -DBUILD_DIR=build -P cmake/post-test.cmake
      - name: Install
        run: cmake --install build --config ${{ matrix.conf }}
  # Windows msys2 builds
  windows-msys2:
    name: Build MSys ${{ matrix.sys }} - ${{ matrix.conf }}
    runs-on: windows-latest
    strategy:
      matrix:
        sys: [ mingw64, mingw32, ucrt64, clang64 ]
        conf: [ Release, Debug ]
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Install sys (mingw64)
        uses: msys2/setup-msys2@v2
        if: ${{ matrix.sys == 'mingw64' }}
        with:
          msystem: ${{ matrix.sys }}
          install: mingw-w64-x86_64-cmake mingw-w64-x86_64-make git mingw-w64-x86_64-gcc
      - name: Install sys (mingw32)
        uses: msys2/setup-msys2@v2
        if: ${{ matrix.sys == 'mingw32' }}
        with:
          msystem: ${{ matrix.sys }}
          install: mingw-w64-i686-cmake mingw-w64-i686-make git mingw-w64-i686-gcc
      - name: Install sys (ucrt64)
        uses: msys2/setup-msys2@v2
        if: ${{ matrix.sys == 'ucrt64' }}
        with:
          msystem: ${{ matrix.sys }}
          install: mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-make git
            mingw-w64-ucrt-x86_64-gcc
      - name: Install sys (clang64)
        uses: msys2/setup-msys2@v2
        if: ${{ matrix.sys == 'clang64' }}
        with:
          msystem: ${{ matrix.sys }}
          install: mingw-w64-clang-x86_64-cmake mingw-w64-clang-x86_64-make git
            mingw-w64-clang-x86_64-gcc
      - uses: actions/checkout@v6
      - name: Configure
        run: |
          cmake \
            ${{ env.cmake_common_flags }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.conf }} \
            -DIXML_ENABLE_TESTING_INTEGRATION=OFF \
            -DUPNP_ENABLE_TESTING_INTEGRATION=OFF \
            -DCMAKE_INSTALL_PREFIX=${{ GITHUB.WORKSPACE }}/test-install
      - name: Build
        run: cmake --build build --config ${{ matrix.conf }}
      - name: Test
        run: ctest ${{ env.ctest_flags }}
      - name: Debug output
        run: cmake -DBUILD_DIR=build -P cmake/post-test.cmake
      - name: Install
        run: cmake --install build --config ${{ matrix.conf }}
  # Linux sanitizer builds
  build_asan:
    name: Sanitizer build (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Python test dependencies
        run: pip install pytest
      - name: configure
        run: |
          cmake \
            ${{ env.cmake_common_flags }} \
            -DCMAKE_C_FLAGS="-Wall -Wpedantic" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DIXML_ENABLE_TESTING_INTEGRATION=OFF \
            -DUPNP_ENABLE_TESTING_INTEGRATION=OFF \
            ${{ env.cmake_sanitizer_flags }}
      - name: build
        run: cmake --build build
      - name: ctest
        run: ctest ${{ env.ctest_flags }}
  # Linux TSan build (cmake only — TSan is incompatible with ASan/LSan)
  build_tsan:
    name: TSan build (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Python test dependencies
        run: pip install pytest
      - name: configure
        run: |
          cmake \
            ${{ env.cmake_common_flags }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DIXML_ENABLE_TESTING_INTEGRATION=OFF \
            -DUPNP_ENABLE_TESTING_INTEGRATION=OFF \
            ${{ env.cmake_tsan_flags }}
      - name: build
        run: cmake --build build
      - name: ctest
        # libtsan.so needs TLS slots that Python exhausts before dlopen();
        # preloading it at process start avoids the "static TLS block" error
        # in the Python ctypes tests.
        run: |
          LD_PRELOAD=$(gcc -print-file-name=libtsan.so) \
          ctest ${{ env.ctest_flags }}
        env:
          TSAN_OPTIONS: halt_on_error=1
