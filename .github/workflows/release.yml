name: New Release

# on: [push]
on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:

permissions:
  contents: read

env:
  DEBUG: "y"
  RUN_CONFIGURE: true
  RUN_BUILD: true
  RUN_RELEASE: true
  RUN_HOME_KEEPING: true

jobs:
  new_release:
    name: Create release ${{ github.ref_name }}
    runs-on: [ ubuntu-latest ]
    permissions:
      contents: write
    steps:
      - name: Checkout
        # Checkout the repo
        uses: actions/checkout@v6
      - name: Preparation
        # Prepare some useful environment variables
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          #
          # Parse the tag name
          #
          # The "next_release" variable must exist in the parent process
          # so that the script code may alter it.
          #
          next_release=
          # This is for starting the workflow manually, in which case
          # github.ref_name will be undefined.
          git branch >> "$GITHUB_STEP_SUMMARY"
          if [[ $DEBUG == "n" && -z $TAG_NAME ]]; then
            echo "Tag name is empty" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          # Parse the tag name and calculate the next release value
          DEBUG=${DEBUG} scripts/parse_release.sh "$TAG_NAME"
      - name: Validate tag
        # Guard against a tag whose version doesn't match what CMakeLists.txt
        # would produce.  The tarball name comes from CMakeLists.txt, so a
        # mismatch would create a release whose title and tarball version differ.
        # curr_release was written to GITHUB_ENV by parse_release.sh above.
        run: |
          ixml_major=$(grep -E "^set\(IXML_VERSION_MAJOR" CMakeLists.txt | grep -oE '[0-9]+')
          ixml_minor=$(grep -E "^set\(IXML_VERSION_MINOR" CMakeLists.txt | grep -oE '[0-9]+')
          ixml_patch=$(grep -E "^set\(IXML_VERSION_PATCH" CMakeLists.txt | grep -oE '[0-9]+')
          upnp_major=$(grep -E "^set\(UPNP_VERSION_MAJOR" CMakeLists.txt | grep -oE '[0-9]+')
          upnp_minor=$(grep -E "^set\(UPNP_VERSION_MINOR" CMakeLists.txt | grep -oE '[0-9]+')
          upnp_patch=$(grep -E "^set\(UPNP_VERSION_PATCH" CMakeLists.txt | grep -oE '[0-9]+')
          pupnp_major=$((ixml_major + upnp_major))
          pupnp_minor=$((ixml_minor + upnp_minor))
          pupnp_patch=$((ixml_patch + upnp_patch))
          expected="${pupnp_major}.${pupnp_minor}.${pupnp_patch}"
          if [[ "$curr_release" != "$expected" ]]; then
            echo "ERROR: tag version '$curr_release' does not match CMakeLists.txt version '$expected'" \
              | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Tag '$curr_release' matches CMakeLists.txt version '$expected' — OK" \
            | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Configure
        if: ${{ env.RUN_CONFIGURE == 'true' }}
        run: |
          cmake -B build
      - name: Build
        if: ${{ env.RUN_BUILD == 'true' }}
        id: build
        timeout-minutes: 5
        #
        # Build and run checks
        run: |
          cpack -G TBZ2 --config build/CPackSourceConfig.cmake
      - name: Find bz2 name
        id: find-bz-name
        #
        # Find out the bz2 name
        run: |
          bz2_name=
          DEBUG=${DEBUG} scripts/find_out_bz2_name.sh
      - name: SHA256
        #
        # Calculate the SHA256 checksum
        run: |
          sha256sum ${bz2_name} > ${bz2_name}.sha256
          {
            echo '```bash'
            echo "sha256sum ${bz2_name} > ${bz2_name}.sha256"
            echo bz2_name=${{ steps.find-bz-name.outputs.bz2_name }}
            echo '```'
          } >>  "$GITHUB_STEP_SUMMARY"
      - name: List files in the repository root
        run: |
          {
          echo '```bash'
          #ls -la ${{ github.workspace }}
          #echo
          #ls libupnp-*.tar.bz2
          #echo
          ls -la
          echo '```'
          }  >> "$GITHUB_STEP_SUMMARY"
      - name: Release
        #
        # This action uploads the generated release files to GitHub
        # https://github.com/softprops/action-gh-release
        # https://docs.github.com/rest/releases/releases#generate-release-notes-content-for-a-release
        if: ${{ env.RUN_RELEASE  == 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            ${{ steps.find-bz-name.outputs.bz2_name }}
            ${{ steps.find-bz-name.outputs.bz2_name }}.sha256
      - name: Home keeping
        if: ${{ env.RUN_HOME_KEEPING  == 'true' }}
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          #
          # Edit some files
          DEBUG=${DEBUG} scripts/home_keeping.sh
          #
          # Configure git
          git config --global user.name 'GitHub Action'
          git config --global user.email 'github_action@users.noreply.github.com'
          # Commit
          git status >> "$GITHUB_STEP_SUMMARY"
          HOME_KEEPING_BRANCH=${REF_NAME}-home_keeping
          # Create a new branch, since the actual branch might be protected
          git switch -c $HOME_KEEPING_BRANCH
          git add ChangeLog CMakeLists.txt docs/Doxyfile libupnp.spec
          git commit -m "Home keeping for the next release"
          git status >> "$GITHUB_STEP_SUMMARY"
          git push origin HEAD:$HOME_KEEPING_BRANCH
